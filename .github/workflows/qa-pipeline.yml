name: QA Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  qa:
    name: Lint · Security · Test · Coverage
    runs-on: ubuntu-latest

    # ── PostgreSQL service container for integration tests ─────────────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cosmotarot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    env:
      # Supabase / Gemini — real values not needed for tests (all external calls are mocked)
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_ANON_KEY: test_anon_key
      SUPABASE_SERVICE_ROLE_KEY: test_service_role_key
      GEMINI_API_KEY: test_gemini_key
      # PostgreSQL for integration tests
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/cosmotarot_test
      TEST_DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/cosmotarot_test
      APP_ENV: testing

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── 4. Linting (ruff) ────────────────────────────────────────────────────
      - name: Lint — ruff
        run: ruff check app/ tests/

      # ── 5. Static security analysis (bandit) ─────────────────────────────────
      - name: Security scan — bandit
        run: bandit -r app/ -ll -x app/tests

      # ── 6. Dependency vulnerability check (safety) ───────────────────────────
      - name: Dependency check — safety
        run: safety check --full-report
        # NOTE: continue-on-error because transitive dependencies (e.g., from
        # google-generativeai) may have known CVEs that we cannot fix directly.
        # We review safety output manually and update when upstream patches are available.
        continue-on-error: true

      # ── 7. Unit tests ────────────────────────────────────────────────────────
      - name: Unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing

      # ── 8. Contract tests (Gemini API contract) ───────────────────────────────
      - name: Contract tests
        run: |
          pytest tests/contract/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-append \
            --cov-report=xml:coverage-contract.xml \
            --cov-report=term-missing

      # ── 9. Integration tests (requires PostgreSQL) ────────────────────────────
      - name: Integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-append \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing

      # ── 10. Coverage gate (≥ 85%) ─────────────────────────────────────────────
      - name: Coverage gate — fail if below 85%
        run: coverage report --fail-under=85

      # ── 11. Upload coverage to Codecov ────────────────────────────────────────
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage-unit.xml,backend/coverage-contract.xml,backend/coverage-integration.xml
          flags: unittests
          name: cosmotarot-coverage
          fail_ci_if_error: false
