name: cosmo_tarot
description: "AI-powered tarot, astrology & numerology app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # HTTP client
  dio: ^5.8.0+1

  # Secure token storage (iOS Keychain / Android EncryptedSharedPreferences)
  flutter_secure_storage: ^9.2.4

  # Fonts (Cinzel + Lato via Google Fonts)
  google_fonts: ^6.2.1

  # Animations
  lottie: ^3.3.1

  # i18n helpers
  intl: ^0.20.2

  # Shared preferences (non-sensitive settings)
  shared_preferences: ^2.3.5

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.2

flutter:
  uses-material-design: true

  generate: true  # enables flutter gen-l10n for i18n

  assets:
    - assets/images/
    - assets/animations/

  # Fonts loaded via google_fonts package at runtime — no local font files needed
